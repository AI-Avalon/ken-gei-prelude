<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1225"/>
      <stop offset="100%" style="stop-color:#1a1f3d"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4b96e"/>
      <stop offset="50%" style="stop-color:#c4ab6e"/>
      <stop offset="100%" style="stop-color:#876339"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c4ab6e;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#c4ab6e;stop-opacity:0.1"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Crescendo wedge (< shape) representing musical crescendo -->
  <path d="M 120 160 L 280 256 L 120 352" fill="none" stroke="url(#gold)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Musical note -->
  <ellipse cx="370" cy="300" rx="38" ry="28" fill="url(#gold)" transform="rotate(-15 370 300)"/>
  <rect x="395" y="160" width="10" height="145" rx="5" fill="url(#gold)" transform="rotate(-3 400 230)"/>
  <path d="M 400 160 Q 430 140 410 180" fill="none" stroke="url(#gold)" stroke-width="8" stroke-linecap="round"/>
  <!-- Subtle decorative lines -->
  <line x1="140" y1="400" x2="380" y2="400" stroke="url(#accent)" stroke-width="2" opacity="0.4"/>
  <line x1="160" y1="415" x2="360" y2="415" stroke="url(#accent)" stroke-width="1.5" opacity="0.3"/>
</svg>
