name: Scheduled Scrape & Maintenance

on:
  schedule:
    # Run daily at 06:00 JST (21:00 UTC)
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install PDF tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ghostscript webp

      - name: Trigger scrape
        run: |
          echo "🎵 Triggering daily scrape..."
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "https://ken-gei-prelude.pages.dev/api/cron/scrape" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')
          
          echo "HTTP Status: $http_code"
          echo "Response: $body"
          
          if [ "$http_code" != "200" ]; then
            echo "::warning::Scrape returned non-200 status"
          fi

      - name: Trigger maintenance
        run: |
          echo "🔧 Triggering daily maintenance..."
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "https://ken-gei-prelude.pages.dev/api/cron/maintenance" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')
          
          echo "HTTP Status: $http_code"
          echo "Response: $body"

      - name: Backfill PDF flyers
        run: |
          echo "🖼️ Backfilling PDF flyers..."
          if npm run backfill:pdf-flyers -- --limit=200; then
            echo "✅ PDF backfill completed"
          else
            echo "::warning::PDF backfill failed (likely Cloudflare auth/scope mismatch). Continuing scheduled maintenance."
          fi
