name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - name: Check Cloudflare secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN が未設定です。"
            echo ""
            echo "🔧 設定手順:"
            echo "  1. https://dash.cloudflare.com/profile/api-tokens にアクセス"
            echo "  2. 「トークンを作成」→「Cloudflare Pages」テンプレート"
            echo "  3. GitHubリポジトリ → Settings → Secrets → Actions → New repository secret"
            echo "     Name: CLOUDFLARE_API_TOKEN  Value: 作成したトークン"
            echo ""
            exit 1
          fi
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID が未設定です。"
            echo ""
            echo "🔧 設定手順:"
            echo "  1. https://dash.cloudflare.com → 右サイドバー「アカウントID」をコピー"
            echo "  2. GitHubリポジトリ → Settings → Secrets → Actions → New repository secret"
            echo "     Name: CLOUDFLARE_ACCOUNT_ID  Value: コピーしたID"
            echo ""
            exit 1
          fi

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name=ken-gei-prelude
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
